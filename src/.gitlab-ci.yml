stages: [lint, test, build, verify]

default:
  image: node:24
  variables:
    NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/

# --- LINT ---
lint:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm ci
    - npm run lint
    # раскомментируй, если есть скрипт в package.json
    # - npm run format:check

# --- TEST ---
# Используем образ с браузерами, чтобы работал ChromeHeadless (Karma)
test:
  stage: test
  image: mcr.microsoft.com/playwright:v1.48.0-jammy
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm ci
    # если у тебя karma+chromeheadless — этого достаточно:
    - npm run test -- --watch=false --browsers=ChromeHeadless
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 1 week

# --- BUILD ---
build:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm ci
    - npm run build
  artifacts:
    name: "dist-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/
    expire_in: 1 week

# --- SSR SMOKE ---
ssr_smoke:
  stage: verify
  needs: ["build"]
  image: node:24
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - node dist/arcana/server/server.mjs & SERVER_PID=$!
    - timeout 20 bash -c 'until curl -sf http://127.0.0.1:4000 >/dev/null; do sleep 1; done'
    - curl -sf http://127.0.0.1:4000 | head -n 20
    - kill $SERVER_PID
