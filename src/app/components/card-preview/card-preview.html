<article class="card-preview" aria-live="polite">
  <p class="card-preview__label">Your card</p>
  <h2 class="card-preview__title">{{ name() }}</h2>
  <p class="card-preview__keywords">{{ keywords().join(' · ') }}</p>
  <p class="card-preview__interpretation">{{ shortInterpretation() }}</p>
</article>
