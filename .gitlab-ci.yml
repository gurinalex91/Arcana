stages: [lint, test, build, verify]

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

default:
  image: node:24
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/

# --- LINT ---
lint:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm ci
    - npm run lint

# --- TEST ---
test:
  stage: test
  image: node:24
  variables:
    CHROME_BIN: /usr/bin/chromium
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - apt-get update -y >/dev/null
    - apt-get install -y --no-install-recommends chromium ca-certificates fonts-liberation >/dev/null
    - npm ci
    - npm run test -- --watch=false --browsers=ChromeHeadlessNoSandbox
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 1 week
# --- BUILD ---
build:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm ci
    - npm run build
  artifacts:
    name: "dist-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/
    expire_in: 1 week

# --- SSR SMOKE ---
ssr_smoke:
  stage: verify
  needs: ["build"]
  image: node:24
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm ci
    - apt-get update >/dev/null && apt-get install -y curl >/dev/null
    - node dist/arcana/server/server.mjs & SERVER_PID=$!
    - timeout 20 bash -c 'until curl -sf http://127.0.0.1:4000 >/dev/null; do sleep 1; done'
    - curl -sf http://127.0.0.1:4000 | head -n 20
    - kill $SERVER_PID
