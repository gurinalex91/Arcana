<main class="arcana-app">
  <section class="arcana-app__panel" aria-labelledby="arcana-title">
    <arc-intro-section [showAction]="flowState() === 'intro'" (drawStarted)="startDraw()" />

    @if (flowState() === 'ready') {
      <arc-card-draw (cardDrawn)="drawCard()" />
    }

    @if (flowState() === 'drawn' && selectedCard(); as card) {
      <arc-card-preview
        [name]="card.name"
        [keywords]="card.keywords"
        [shortInterpretation]="card.shortInterpretation"
      />
    }

    <p class="arcana-app__safety-note">
      For entertainment and self-reflection only. Not advice, prediction, therapy, or guaranteed
      truth.
    </p>
  </section>
</main>

<router-outlet />
